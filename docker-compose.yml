# =============================================================================
# AI Stack — Multi-Agent Hermes Architecture
# =============================================================================
#
#   You ──Telegram (@AssistantBot)──► Hermes: Personal Assistant
#   You ──Telegram (@CTOBot)────────► Hermes: CTO / Technical Expert
#                                       │
#              ┌────────────────────────┘
#              ▼
#   ┌─ Anthropic API ─── primary reasoning
#   ├─ OpenRouter ─────── sub-tasks, cheap fallback
#   └─ Ollama GPU ─────── heartbeats, offline, privacy
#
#   Mission Control (optional) ─── cost dashboard
#
# ADDING MORE AGENTS:
#   1. Copy the hermes-cto service block
#   2. Change: container_name, volume name, TELEGRAM_BOT_TOKEN var
#   3. Create a new Telegram bot via @BotFather
#   4. Add the new volume to the volumes section
#   5. docker compose up -d
#   6. docker exec -it <new-container> hermes setup
#
# NETWORK: Uses external "ai-core" network.
#   Create first:  docker network create ai-core
# =============================================================================

networks:
  ai-core:
    external: true

volumes:
  hermes-personal-data:
    driver: local
  # hermes-cto-data:
  #   driver: local
  mission-control-data:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local
  firecrawl-nuq-data:
    driver: local

services:
  # ---------------------------------------------------------------------------
  # OLLAMA — Shared Local GPU Model (RTX 2070 Super, 8GB VRAM)
  # ---------------------------------------------------------------------------
  # Shared by all Hermes agents. Qwen 3 8B for heartbeats and offline.
  # After first boot:  docker exec ollama-gpu ollama pull qwen3:8b
  # ---------------------------------------------------------------------------
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama-gpu
    restart: unless-stopped
    networks:
      - ai-core
    ports:
      - "11434:11434"
    volumes:
      - /mnt/app-cache/appdata/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_GPU=999
      - OLLAMA_KEEP_ALIVE=30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # HERMES — Personal Assistant
  # ---------------------------------------------------------------------------
  # Your daily driver. Calendar, reminders, personal tasks, general chat.
  # Learns your preferences, routines, and communication style over time.
  #
  # First-time:  docker exec -it hermes-personal hermes setup
  # Telegram:    Create bot via @BotFather → token in .env
  # ---------------------------------------------------------------------------
  hermes-personal:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-personal
    restart: unless-stopped
    networks:
      - ai-core
    volumes:
      - hermes-personal-data:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_PERSONAL}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - FIRECRAWL_API_URL=http://firecrawl-api:3002
      - HONCHO_BASE_URL=http://honcho:8000
      - HONCHO_API_KEY=${HONCHO_SECRET_KEY}
    depends_on:
      ollama-gpu:
        condition: service_started
      honcho:
        condition: service_healthy
    command: gateway run

  # ---------------------------------------------------------------------------
  # HERMES — CTO / Technical Expert
  # ---------------------------------------------------------------------------
  # Architecture decisions, code review, system design, technical research.
  # Builds its own skill library around your tech stack over time.
  #
  # This agent has completely isolated memory and skills from the personal
  # assistant. It will develop deep expertise in your codebase, infra
  # patterns, and engineering preferences independently.
  #
  # First-time:  docker exec -it hermes-cto hermes setup
  # Telegram:    Create a SEPARATE bot via @BotFather → token in .env
  #
  # TIP: During setup, you can configure a different primary model.
  #   Personal assistant → Claude Sonnet (fast, cheap for daily chat)
  #   CTO agent → Claude Opus (deeper reasoning for architecture decisions)
  # ---------------------------------------------------------------------------
  # hermes-cto:
  #   image: nousresearch/hermes-agent:latest
  #   container_name: hermes-cto
  #   restart: unless-stopped
  #   networks:
  #     - ai-core
  #   volumes:
  #     - hermes-cto-data:/opt/data
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   environment:
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  #     - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN_CTO}
  #     - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
  #     - FIRECRAWL_API_URL=http://firecrawl-api:3002
  #     - HONCHO_BASE_URL=http://honcho:8000
  #     - HONCHO_API_KEY=${HONCHO_SECRET_KEY}
  #   depends_on:
  #     ollama-gpu:
  #       condition: service_started
  #     honcho:
  #       condition: service_healthy
  #   command: gateway run

  # ---------------------------------------------------------------------------
  # REDIS — Job Queue (Firecrawl dependency)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - ai-core
    volumes:
      - redis-data:/data
    command: redis-server --bind 0.0.0.0 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # POSTGRES — Honcho (pgvector + pg_trgm required by Honcho)
  # ---------------------------------------------------------------------------
  # init script runs only on first data volume init; if you migrated from
  # plain postgres:16-alpine, exec in and: CREATE EXTENSION vector; CREATE EXTENSION pg_trgm;
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: unless-stopped
    networks:
      - ai-core
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-honcho-extensions.sql:/docker-entrypoint-initdb.d/01-honcho-extensions.sql:ro
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-ai_stack}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # CAMOFOX — Hermes Browser Service (Stealth Firefox)
  # ---------------------------------------------------------------------------
  # Managed browser sessions for Hermes agents. Enables web browsing,
  # form interaction, and persistent sessions with cookie support.
  #
  # API:  http://<host>:9377
  # Docs: https://github.com/jo-inc/camofox-browser
  #
  # After boot, set in ~/.hermes/config.yaml:
  #   browser:
  #     camofox:
  #       managed_persistence: true
  # ---------------------------------------------------------------------------
  camofox:
    image: camofox:local
    container_name: camofox
    restart: unless-stopped
    networks:
      - ai-core
    ports:
      - "9377:9377"
    shm_size: "1gb"
    environment:
      - CAMOFOX_PORT=9377
      - CAMOFOX_API_KEY=${CAMOFOX_API_KEY}
      - CAMOFOX_ADMIN_KEY=${CAMOFOX_ADMIN_KEY}
      - MAX_SESSIONS=${CAMOFOX_MAX_SESSIONS:-10}
      - SESSION_TIMEOUT_MS=1800000
      - BROWSER_IDLE_TIMEOUT_MS=300000

  # ---------------------------------------------------------------------------
  # RABBITMQ — Message Queue (Firecrawl dependency)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    networks:
      - ai-core
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # FIRECRAWL NUQ — Postgres for Firecrawl job queue (NUQ)
  # ---------------------------------------------------------------------------
  # Harness detects compose mode when POSTGRES_HOST != localhost and points
  # NUQ at this DB. Do not reuse Honcho’s database.
  # ---------------------------------------------------------------------------
  firecrawl-nuq-postgres:
    image: ghcr.io/firecrawl/nuq-postgres:latest
    container_name: firecrawl-nuq-postgres
    restart: unless-stopped
    networks:
      - ai-core
    volumes:
      - firecrawl-nuq-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${FIRECRAWL_NUQ_USER:-firecrawl}
      - POSTGRES_PASSWORD=${FIRECRAWL_NUQ_PASSWORD}
      - POSTGRES_DB=${FIRECRAWL_NUQ_DB:-firecrawl}
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # FIRECRAWL — Web Scraping & Crawling API
  # ---------------------------------------------------------------------------
  # Turns any URL into LLM-ready markdown. Used by Hermes agents for
  # research, summarisation, and web-grounded answers.
  #
  # API:  http://<host>:3002/v1
  # Auth: Set FIRECRAWL_API_KEY in .env
  #
  # playwright-service handles JS-heavy page rendering for the crawler.
  # NUQ Postgres (firecrawl-nuq-postgres) is required for the queue workers.
  # USE_DB_AUTHENTICATION=false — no Supabase; NUQ still uses Postgres above.
  # ---------------------------------------------------------------------------
  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: firecrawl-playwright
    restart: unless-stopped
    networks:
      - ai-core
    environment:
      - PORT=3000
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - BLOCK_MEDIA=${FIRECRAWL_BLOCK_MEDIA:-true}
      - MAX_CONCURRENT_PAGES=${FIRECRAWL_CONCURRENT_REQUESTS:-10}
    tmpfs:
      - /tmp/.cache:noexec,nosuid,size=1g

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: firecrawl-api
    restart: unless-stopped
    networks:
      - ai-core
    ports:
      - "${FIRECRAWL_PORT:-3002}:3002"
    environment:
      - HOST=0.0.0.0
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000/scrape
      - NUQ_RABBITMQ_URL=amqp://rabbitmq:5672
      - POSTGRES_HOST=firecrawl-nuq-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${FIRECRAWL_NUQ_USER:-firecrawl}
      - POSTGRES_PASSWORD=${FIRECRAWL_NUQ_PASSWORD}
      - POSTGRES_DB=${FIRECRAWL_NUQ_DB:-firecrawl}
      - USE_DB_AUTHENTICATION=false
      - NUM_WORKERS_PER_QUEUE=${FIRECRAWL_NUM_WORKERS:-8}
      - CRAWL_CONCURRENT_REQUESTS=${FIRECRAWL_CONCURRENT_REQUESTS:-10}
      - MAX_CONCURRENT_JOBS=${FIRECRAWL_MAX_JOBS:-5}
      - BULL_AUTH_KEY=${FIRECRAWL_API_KEY}
      - TEST_API_KEY=${FIRECRAWL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=http://ollama-gpu:11434/api
      - MODEL_NAME=${FIRECRAWL_OLLAMA_MODEL:-qwen3:8b}
      - MODEL_EMBEDDING_NAME=${FIRECRAWL_OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      firecrawl-nuq-postgres:
        condition: service_healthy
    command: node dist/src/harness.js --start-docker

  # ---------------------------------------------------------------------------
  # HONCHO — User & Session Memory for AI Agents
  # ---------------------------------------------------------------------------
  # Persistent memory layer for Hermes agents. Tracks user context, goals,
  # and conversation history across sessions.
  #
  # LLM routing (Honcho v3 SupportedProviders: custom = OpenAI-compatible):
  #   Summarization  → vLLM client → Ollama at /v1 (GPU, matches stack default model)
  #   Summary backup → OpenRouter (custom)
  #   Deriver / dialectic / dream → OpenRouter (custom), tiered models
  #   Embeddings     → OpenAI (OpenRouter has no embeddings API)
  #
  # API:  http://<host>:8000
  # Docs: https://docs.honcho.dev
  # ---------------------------------------------------------------------------
  honcho:
    image: ghcr.io/plastic-labs/honcho:latest
    container_name: honcho
    restart: unless-stopped
    networks:
      - ai-core
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_stack}
      - AUTH_JWT_SECRET=${HONCHO_SECRET_KEY}
      - AUTH_USE_AUTH=false
      # OpenRouter — OpenAI-compatible client (provider "custom" in Honcho)
      - LLM_OPENAI_COMPATIBLE_API_KEY=${OPENROUTER_API_KEY}
      - LLM_OPENAI_COMPATIBLE_BASE_URL=https://openrouter.ai/api/v1
      # Ollama — separate vLLM client (OpenAI-compatible API at /v1)
      - LLM_VLLM_BASE_URL=http://ollama-gpu:11434/v1
      - LLM_VLLM_API_KEY=ollama
      # Summarization — local GPU via Ollama; backup via OpenRouter
      - SUMMARY_PROVIDER=vllm
      - SUMMARY_MODEL=${HONCHO_SUMMARY_OLLAMA_MODEL:-qwen3:8b}
      - SUMMARY_BACKUP_PROVIDER=custom
      - SUMMARY_BACKUP_MODEL=${HONCHO_SUMMARY_BACKUP_MODEL:-google/gemini-2.0-flash-lite}
      # Deriver (background) — fast OpenRouter model
      - DERIVER_PROVIDER=custom
      - DERIVER_MODEL=${HONCHO_DERIVER_MODEL:-google/gemini-2.0-flash-lite}
      # Dialectic — tiered OpenRouter models per reasoning level
      - DIALECTIC_LEVELS__minimal__PROVIDER=custom
      - DIALECTIC_LEVELS__minimal__MODEL=${HONCHO_DIALECTIC_MINIMAL_MODEL:-google/gemini-2.0-flash-lite}
      - DIALECTIC_LEVELS__minimal__THINKING_BUDGET_TOKENS=0
      - DIALECTIC_LEVELS__minimal__MAX_TOOL_ITERATIONS=1
      - DIALECTIC_LEVELS__minimal__MAX_OUTPUT_TOKENS=250
      - DIALECTIC_LEVELS__minimal__TOOL_CHOICE=any
      - DIALECTIC_LEVELS__low__PROVIDER=custom
      - DIALECTIC_LEVELS__low__MODEL=${HONCHO_DIALECTIC_LOW_MODEL:-google/gemini-2.0-flash-lite}
      - DIALECTIC_LEVELS__low__THINKING_BUDGET_TOKENS=0
      - DIALECTIC_LEVELS__low__MAX_TOOL_ITERATIONS=5
      - DIALECTIC_LEVELS__low__TOOL_CHOICE=any
      - DIALECTIC_LEVELS__medium__PROVIDER=custom
      - DIALECTIC_LEVELS__medium__MODEL=${HONCHO_DIALECTIC_MEDIUM_MODEL:-openai/gpt-4o-mini}
      - DIALECTIC_LEVELS__medium__THINKING_BUDGET_TOKENS=0
      - DIALECTIC_LEVELS__medium__MAX_TOOL_ITERATIONS=2
      - DIALECTIC_LEVELS__high__PROVIDER=custom
      - DIALECTIC_LEVELS__high__MODEL=${HONCHO_DIALECTIC_HIGH_MODEL:-anthropic/claude-3.5-sonnet}
      - DIALECTIC_LEVELS__high__THINKING_BUDGET_TOKENS=0
      - DIALECTIC_LEVELS__high__MAX_TOOL_ITERATIONS=4
      - DIALECTIC_LEVELS__max__PROVIDER=custom
      - DIALECTIC_LEVELS__max__MODEL=${HONCHO_DIALECTIC_MAX_MODEL:-anthropic/claude-3.5-sonnet}
      - DIALECTIC_LEVELS__max__THINKING_BUDGET_TOKENS=0
      - DIALECTIC_LEVELS__max__MAX_TOOL_ITERATIONS=10
      # Dream — OpenRouter (would default to Anthropic without these)
      - DREAM_PROVIDER=custom
      - DREAM_MODEL=${HONCHO_DREAM_MODEL:-anthropic/claude-3.5-sonnet}
      - DREAM_DEDUCTION_MODEL=${HONCHO_DREAM_DEDUCTION_MODEL:-google/gemini-2.0-flash-lite}
      - DREAM_INDUCTION_MODEL=${HONCHO_DREAM_INDUCTION_MODEL:-google/gemini-2.0-flash-lite}
      # Embeddings — direct OpenAI key (OpenRouter has no embeddings endpoint)
      - LLM_OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBED_MESSAGES=true
      - LLM_EMBEDDING_PROVIDER=openai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      ollama-gpu:
        condition: service_started
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # MISSION CONTROL — Web Dashboard (OPTIONAL)
  # ---------------------------------------------------------------------------
  # Start with:  docker compose --profile dashboard up -d
  # Access:      http://<unraid-ip>:3000/setup
  # ---------------------------------------------------------------------------
  mission-control:
    image: ghcr.io/builderz-labs/mission-control:latest
    container_name: mission-control
    restart: unless-stopped
    networks:
      - ai-core
    ports:
      - "3000:3000"
    volumes:
      - mission-control-data:/app/.data
    environment:
      - AUTH_USER=${MC_AUTH_USER:-admin}
      - AUTH_PASS=${MC_AUTH_PASS}
      - API_KEY=${MC_API_KEY}
      - NEXT_PUBLIC_GATEWAY_OPTIONAL=true
    profiles:
      - dashboard
